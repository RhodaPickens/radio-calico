<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radio Calico — Lossless Internet Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <img src="/RadioCalicoLogoTM.png" alt="Radio Calico logo" class="nav-logo" />
    <span class="nav-title">Radio Calico</span>
  </nav>

  <main>
    <section class="player-card">
      <img src="/RadioCalicoLogoTM.png" alt="Radio Calico" class="player-logo" />

      <div class="live-badge">
        <span class="live-dot"></span>
        LIVE
      </div>

      <h1>Radio Calico</h1>
      <p class="tagline">24-bit / 48 kHz &middot; Lossless &middot; Ad-free</p>

      <div class="now-playing">
        <img id="album-art" class="album-art hidden" src="" alt="Album art" />
        <div class="track-info">
          <span id="track-title">—</span>
          <span id="track-artist"></span>
          <span id="track-album"></span>
        </div>
      </div>

      <div class="control-box">
        <button id="btn-play-pause" class="btn-play" aria-label="Play">
          <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" class="hidden" viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>

        <span id="elapsed-time" class="elapsed-time">0:00</span>

        <div class="volume-area">
          <svg class="vol-icon" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
          </svg>
          <input id="volume" type="range" min="0" max="1" step="0.01" value="1" aria-label="Volume" />
        </div>
      </div>

      <div id="status" class="status">Click play to tune in</div>

      <div id="rating-area" class="rating-area hidden">
        <p>How's the sound?</p>
        <div id="stars">
          <span class="star" data-value="1">&#9733;</span>
          <span class="star" data-value="2">&#9733;</span>
          <span class="star" data-value="3">&#9733;</span>
          <span class="star" data-value="4">&#9733;</span>
          <span class="star" data-value="5">&#9733;</span>
        </div>
      </div>
    </section>

    <section class="recently-played">
      <h2>Recently Played</h2>
      <ul id="recent-tracks">
        <li class="empty">Tune in to see recent tracks.</li>
      </ul>
    </section>
  </main>

  <footer>
    <p>Radio Calico &mdash; Crystal-clear lossless radio for audiophiles</p>
  </footer>

  <audio id="audio" preload="none"></audio>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
